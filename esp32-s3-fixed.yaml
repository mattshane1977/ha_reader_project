esphome:
  name: esp32-s3-fixed
  friendly_name: ESP32-S3 Fixed
  platformio_options:
    build_flags: 
      - -DARDUINO_USB_CDC_ON_BOOT=0
      - -DARDUINO_USB_MSC_ON_BOOT=0
      - -DARDUINO_USB_DFU_ON_BOOT=0
      - -DBOARD_HAS_PSRAM
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino
  flash_size: 16MB

psram:
  mode: octal
  speed: 40MHz

# Enable Web Server for browser access
web_server:
  port: 80

# Enable mDNS for discovery
mdns:
  disabled: false

logger:
  hardware_uart: UART0
  level: DEBUG # Reduced from VERY_VERBOSE for stability
  baud_rate: 115200

api:
ota:
  - platform: esphome

wifi:
  ssid: "Home"
  password: "Kayden2016"
  ap:
    ssid: "Esp32-S3-Fixed-Fallback"

captive_portal:
